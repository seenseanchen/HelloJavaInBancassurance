spring:
  application:
    name: bancassurance

  # ----- DataSource: 連到 docker compose 起的 PostgreSQL -----
  datasource:
    url: jdbc:postgresql://localhost:5432/bancassurance
    username: dev
    password: dev
    driver-class-name: org.postgresql.Driver
    hikari:
      # HikariCP 連線池參數 — 銀行業面試最愛問的調參
      maximum-pool-size: 10        # 預設 10；經驗值: CPU * 2 + 有效硬碟數
      minimum-idle: 2
      connection-timeout: 30000     # ms
      idle-timeout: 600000          # 10 分鐘
      max-lifetime: 1800000         # 30 分鐘 (要短於 DB 端的 wait_timeout)

  # ----- JPA / Hibernate -----
  jpa:
    hibernate:
      ddl-auto: validate            # 啟動時驗證 Entity 對應的表存在；
                                    # 銀行業禁用 update/create/create-drop，
                                    # 任何 schema 變動必須走 Flyway
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC            # 確保時間欄位以 UTC 寫入
    show-sql: true                  # dev 階段打開，prod 關掉
    open-in-view: false             # ★ 重要：關掉 OSIV anti-pattern

  # ----- Flyway: schema 版控 -----
  flyway:
    enabled: true
    baseline-on-migrate: true       # 第一次跑遇到非空 DB 時自動 baseline
    locations: classpath:db/migration

# ----- Server -----
server:
  port: 8080
  forward-headers-strategy: framework
  error:
    include-message: always         # dev 階段把錯誤訊息回給 client；prod 改 never
    include-binding-errors: always

# ----- Actuator: 健康檢查 endpoint -----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized   # 未登入只看 UP/DOWN，登入看細節
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    enabled: true
    # dev 先採樣 100%，方便驗證 trace；prod 可調降到 0.1 或依流量策略調整
    sampling:
      probability: 1.0

# ----- 應用層自訂設定 (M5 demo + M9 security) -----
# YAML 不允許同層級重複 key —「app:」只能宣告一次，底下分多個 namespace。
# 之前曾踩到「兩個 app: 區塊」的 duplicate key 例外，留個註解警示。
app:
  # ----- M9 Security / JWT 設定 -----
  # (面試題 / 中級)：「JWT secret 怎麼管？」
  #   ❌ 寫死在 application.yml 進 git → secret leak (CWE-798)
  #   ✔ 環境變數 / Vault / AWS Secrets Manager / k8s Secret
  #   ✔ secret 至少 256 bits (32 bytes) for HS256；本地 dev 給的 placeholder 比這還長，
  #     production 換成從 Vault 撈隨機產生的 64-byte Base64 字串
  security:
    jwt:
      # JWT 簽發者 (issuer claim)。client 應該驗 iss = 預期值，避免「拿別系統 token 來打」
      issuer: bancassurance-backend
      # ⚠️  DEV-ONLY secret — 上 prod 前必須換掉並從外部來源讀取 (例如 ${APP_JWT_SECRET})
      # 至少 32 個 ASCII 字元 (= 32 bytes = 256 bits) 才滿足 HS256 最低需求
      secret: ${APP_JWT_SECRET:dev-only-secret-rotate-this-before-going-to-production-32+chars-please}
      # token 存活時間 (毫秒)。1 小時是業界常見預設，銀行業常見 15min–1h 配上 refresh token
      ttl-ms: 3600000

  # ----- Demo / 教學專用旗標 (production 禁止開啟) -----
  demo:
    # 樂觀鎖衝突示範用 sleep（ms）。
    # 設為 > 0 可在 saveAndFlush 前人工暫停，放大衝突視窗，讓兩支平行 curl 都讀到同一個 version
    # 後再競爭更新，重現真正的 409 OPTIMISTIC_LOCK_CONFLICT。
    # 預設 0（關閉）；本機測試時可設為 3000（3 秒）。
    optimistic-lock-sleep-ms: 3000

# ----- springdoc-openapi (M7) -----
springdoc:
  api-docs:
    # OpenAPI JSON 規格的取用路徑 (可匯入 Postman / Insomnia / Kong)
    # 預設是 /v3/api-docs，改到 /api-docs 縮短記憶路徑
    path: /api-docs
  swagger-ui:
    # Swagger UI 瀏覽器介面路徑 (預設 /swagger-ui.html)
    path: /swagger-ui
    # ★ 明確指定 swagger-config JSON 的位置
    #   springdoc 的重定向機制：GET /swagger-ui
    #     → 302 → /swagger-ui/index.html?configUrl=/api-docs/swagger-config
    #   Swagger UI 先 GET /api-docs/swagger-config 拿到 spec URL 清單，
    #   再 GET /api-docs 取得實際的 OpenAPI JSON。
    #   直接開 /swagger-ui/index.html 不會有 configUrl 參數，所以要顯式設定。
    config-url: /api-docs/swagger-config
    # ★ 同時明確指定 spec URL（雙重保險）
    url: /api-docs
    # ★ 禁止 Swagger UI 帶入 Petstore 預設 URL
    disable-swagger-default-url: true
    # 讓 Swagger UI 按 @Tag name 字母排序，找 API 比較方便
    tags-sorter: alpha
    # 每個 tag group 內的 endpoint 按 HTTP method 排序 (GET → PATCH → POST → PUT → DELETE)
    operations-sorter: method
    # 預設展開所有 schema model，方便觀察 DTO 欄位
    default-models-expand-depth: 2
    # 用 Swagger UI 互動時持久化 Authorization header (dev 環境方便)
    persist-authorization: true
  # 把 actuator endpoints 排除在 Swagger UI 之外，避免文件太亂
  # (面試題 / 中級)：「生產環境 actuator 要怎麼保護？」
  #   答：spring-security 把 /actuator/** 限制只允許內網 IP 或特定 role。
  packages-to-scan: com.sean.bancassurance
  paths-to-exclude: /actuator/**

# ----- Logging -----
logging:
  # M6 新增：在 log pattern 加入 traceId，每行 log 都自動帶上請求追蹤 ID。
  #
  # %X{traceId:-no-trace}：
  #   %X{key}           → 從 MDC 取 key 的值 (MDC = Mapped Diagnostic Context)
  #   :-no-trace        → 若 MDC 裡沒有 traceId (例如背景排程)，顯示 "no-trace" 作為預設值
  #
  # 效果：
  #   有 request 時：  12:34:56.789 [http-nio-8080-exec-1] INFO  [traceId=550e8400-e29b-...] PolicyService - ...
  #   背景 thread 時： 12:34:56.789 [main] INFO  [traceId=no-trace] BancassuranceApplication - Starting...
  #
  # (面試題 / 中級)：「ELK 上要怎麼搜一次請求的所有 log？」
  #   答：在 Kibana query bar 下 `traceId: "550e8400-..."` 即可。
  #       Logstash 的 json filter 會把 log pattern 裡的欄位解析成 structured field，
  #       搜尋效能遠優於 full-text search。
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-no-trace}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.sean.bancassurance: DEBUG
    org.hibernate.SQL: DEBUG          # 印 SQL
    org.hibernate.orm.jdbc.bind: TRACE # 印 ? 參數實際值 (debug 神器)
