services:
  postgres:
    image: postgres:16-alpine
    container_name: bancassurance-pg
    environment:
      POSTGRES_DB: bancassurance
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      TZ: Asia/Taipei
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d bancassurance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
