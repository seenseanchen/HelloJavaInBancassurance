services:
  m11-gateway:
    image: nginx:alpine
    container_name: m11-gateway
    ports:
      - "18081:80"
      - "18443:443"
    volumes:
      - ./config/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Dev TLS certificates (generate via ops/infra/scripts/generate-local-certs.sh)
      - ./config/nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
